<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Serana's Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { --vampire-purple: #4b0082; --silver: #c0c0c0; --cold-stone: #0a0a0c; --blood-red: #440000; --vh: 1vh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            background: var(--cold-stone); color: #d1d1d1; 
            font-family: 'Crimson Pro', serif; overflow: hidden; 
        }

        #app-wrapper { display: flex; width: 100%; height: 100%; overflow: hidden; position: relative; }

        #sidebar {
            width: 320px; height: 100%; background: #000; border-right: 2px solid var(--vampire-purple);
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; z-index: 10;
        }

        #options-overlay {
            position: absolute; left: 0; top: 0; height: 100%; width: 320px;
            background: rgba(5, 5, 10, 0.98); border-right: 1px solid var(--vampire-purple);
            transform: translateX(-100%); transition: transform 0.3s ease-out;
            z-index: 100; padding: 60px 20px 20px 20px; display: flex; flex-direction: column;
            backdrop-filter: blur(15px); overflow-y: auto;
        }
        #options-overlay.open { transform: translateX(0); }

        #gear-btn {
            position: absolute; top: 15px; left: 15px; font-size: 22px;
            color: var(--silver); cursor: pointer; z-index: 110; opacity: 0.6;
        }

        .portrait-container { width: 100%; text-align: center; margin-top: 20px; position: relative; min-height: 200px; }
        #sidebar img { max-width: 100%; height: auto; max-height: 55vh; border: 1px solid var(--vampire-purple); border-radius: 2px; }
        
        #status-light { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #333; margin-right: 8px; transition: 0.3s; }
        .online { background: #00ff00 !important; box-shadow: 0 0 5px #00ff00; }
        .error { background: #ff0000 !important; box-shadow: 0 0 5px #ff0000; }

        .dl-btn { 
            display: none; position: absolute; bottom: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: var(--silver); border: 1px solid var(--vampire-purple); 
            padding: 5px 10px; font-size: 10px; cursor: pointer;
        }

        label { display: block; color: var(--vampire-purple); font-family: 'Cinzel Decorative'; font-size: 0.7em; margin-bottom: 8px; }
        textarea, input, select { width: 100%; background: #080808; border: 1px solid #222; color: #bbb; padding: 12px; margin-bottom: 20px; outline: none; font-size: 14px; border-radius: 4px; }
        
        #main { 
            flex: 1; display: flex; flex-direction: column; 
            background: linear-gradient(135deg, #050508 0%, #110022 100%);
            position: relative; overflow: hidden;
        }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; width: 100%; max-width: 850px; margin: 0 auto; }

        #input-area { 
            flex-shrink: 0; width: 100%; background: #000; border-top: 1px solid var(--vampire-purple); 
            display: flex; align-items: center; padding: 15px 20px; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .msg { margin-bottom: 20px; padding: 18px; max-width: 85%; line-height: 1.6; font-size: 20px; border-radius: 4px; }
        .serana { background: rgba(75, 0, 130, 0.1); border-left: 3px solid var(--vampire-purple); align-self: flex-start; }
        .user { background: rgba(192, 192, 192, 0.05); border: 1px solid #333; align-self: flex-end; color: #fff; }
        
        .serana-action { color: #b0b0b0; font-style: italic; }
        .serana-internal { color: #8a64c7; font-size: 0.9em; font-style: italic; }

        #user-input { flex: 1; min-width: 0; height: 50px; background: #0a0a0a; border: 1px solid #222; color: #fff; font-size: 17px; padding: 0 15px; outline: none; }
        .invoke-btn { flex-shrink: 0; height: 50px; padding: 0 25px; background: var(--vampire-purple); font-family: 'Cinzel Decorative'; font-weight: bold; border: none; cursor: pointer; color: #fff; }

        .gen-status { font-size: 10px; color: var(--silver); text-align: center; margin-top: 10px; font-family: 'Cinzel Decorative'; min-height: 15px; }

        @media (max-width: 800px) {
            #sidebar { width: 100%; height: 70px; flex-direction: row; border-right: none; border-bottom: 1px solid var(--vampire-purple); padding: 0 15px; }
            #options-overlay { width: 100%; }
            #app-wrapper { flex-direction: column; }
            .portrait-container { width: 45px; height: 45px; margin: 0; min-height: 45px; }
            #sidebar img { height: 45px; width: 45px; object-fit: cover; }
            #sidebar h1 { margin-left: 15px; font-size: 1em; flex: 1; }
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="gear-btn" onclick="toggleOptions(event)">⚙</div>

    <div id="options-overlay">
        <label>Groq API Key</label>
        <input type="password" id="api-key" onchange="saveOptions()">
        <label>NovelAI API Key</label>
        <input type="password" id="nai-key" onchange="saveOptions()">
        
        <label>Vampiric Memories</label>
        <textarea id="memory-box" onchange="saveOptions()"></textarea>
        
        <button class="invoke-btn" onclick="toggleOptions(event)" style="margin-bottom:10px;">SAVE & CLOSE</button>
        <button class="reset-btn" onclick="resetHistory()" style="background:none; border:1px solid var(--blood-red); color:var(--blood-red); padding:10px; cursor:pointer; width: 100%;">WIPE CONVERSATION</button>
    </div>

    <div id="sidebar">
        <div class="portrait-container">
            <img src="serana.jpg" alt="Serana" id="active-image">
            <button id="dl-btn" class="dl-btn" onclick="downloadVision()">SAVE VISION</button>
        </div>
        <h1><span id="status-light"></span>SERANA</h1>
        <div id="gen-status" class="gen-status"></div>
    </div>

    <div id="main" onclick="closeOptions()">
        <div id="chat-window"></div>
        <div id="input-area">
            <button onclick="regenerate()" style="background:#0a0a0a; color:var(--vampire-purple); border:1px solid #222; height:50px; width:45px; flex-shrink:0;">↻</button>
            <input type="text" id="user-input" placeholder="Speak with her..." onkeypress="if(event.key === 'Enter') speak()">
            <button class="invoke-btn" onclick="speak()">Invoke</button>
        </div>
    </div>
</div>

<script>
    function setVH() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
    window.addEventListener('resize', setVH); setVH();

    function toggleOptions(e) { if(e) e.stopPropagation(); document.getElementById('options-overlay').classList.toggle('open'); }
    function closeOptions() { document.getElementById('options-overlay').classList.remove('open'); }

    function saveOptions() {
        localStorage.setItem('serana_key', document.getElementById('api-key').value);
        localStorage.setItem('nai_key', document.getElementById('nai-key').value);
        localStorage.setItem('serana_memories', document.getElementById('memory-box').value);
    }

    const POSITIVE = "{artist: aestheticc-meme}, artist: jjune, artist: moonjunk, ai-generated, best quality, very aesthetic, extremely detailed, masterpiece, absurdres, outdoors, night sky, girl, huge breasts, serana, the elder scrolls v: skyrim";
    const NEGATIVE = "realistic, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, blurry, very displeasing, bad proportions, long_bod, bad faces, bad face, bad feet, long neck, long body, long arms, poorly drawn hands, missing limb, floating limbs, disconnected limbs, bad eyes, normal quality, mutation, mutated, extra limb, bad teeth, dark-skinned female, greyscale, colored inner hair, dark areolae, armpit hair, darkness, split image, tan, breast milk, unfinished, over saturated, {steaming body, steam, hearts, heart, face cloud, fog, haze, head steam, steam, mist, sweat, very sweaty, smell}";

    let history = JSON.parse(localStorage.getItem('serana_history')) || [{ role: "assistant", content: "I'm right here. *She adjusts her hood.*" }];

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('serana_key') || '';
        document.getElementById('nai-key').value = localStorage.getItem('nai_key') || '';
        document.getElementById('memory-box').value = localStorage.getItem('serana_memories') || '';
        render();
    };

    function render() {
        const win = document.getElementById('chat-window');
        win.innerHTML = history.map(m => `<div class="msg ${m.role === 'user' ? 'user' : 'serana'}">${m.role === 'user' ? m.content : m.content.replace(/\*(.*?)\*/g, '<span class="serana-action">*$1*</span>').replace(/\((.*?)\)/g, '<span class="serana-internal">($1)</span>')}</div>`).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function generateVisual(text) {
        const key = localStorage.getItem('nai_key');
        if (!key) return;
        const status = document.getElementById('gen-status');
        const light = document.getElementById('status-light');
        status.innerText = "WEAVING VISION...";
        
        const actionMatch = text.match(/\*(.*?)\*/);
        const action = actionMatch ? actionMatch[1] : "looking at viewer";
        const prompt = `${POSITIVE}, ${action}, ${text.replace(/\*.*?\*/g, '').substring(0, 60)}`;

        try {
            // Using a CORS-anywhere proxy but forcing the response to stay text-based (Base64)
            // This bypasses the browser's "CORB" protection which often blocks binary images.
            const proxy = "https://corsproxy.io/?";
            const target = "https://api.novelai.net/ai/generate-image";

            const res = await fetch(proxy + encodeURIComponent(target), {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json",
                    "Accept": "application/x-zip-compressed" // NAI can send a zip, which proxies handle better
                },
                body: JSON.stringify({
                    input: prompt,
                    model: "nai-diffusion-3",
                    action: "generate",
                    parameters: { width: 640, height: 1024, scale: 6, sampler: "k_euler_ancestral", steps: 28, uc: NEGATIVE, ucPreset: 0 }
                })
            });

            if (res.ok) {
                const blob = await res.blob();
                document.getElementById('active-image').src = URL.createObjectURL(blob);
                document.getElementById('dl-btn').style.display = "block";
                status.innerText = "";
                light.className = "online";
            } else { 
                status.innerText = "VEIL BLOCKED (" + res.status + ")"; 
                light.className = "error";
            }
        } catch(e) { 
            status.innerText = "PROXY REJECTED CONNECTION"; 
            light.className = "error";
        }
    }

    async function speak(isRegen = false) {
        const key = localStorage.getItem('serana_key');
        if (!key) { toggleOptions(); return; }
        if (isRegen) { history.pop(); } 
        else { const input = document.getElementById('user-input'); if (!input.value.trim()) return; history.push({role:"user", content: input.value}); input.value=''; }
        render();
        
        const system = `You are Serana from Skyrim. Harkon is dead. You love the Dragonborn. 
        Formatting: Use italics (*asterisks*) for actions. Use (parentheses) for internal thoughts. 
        DO NOT include the words "Silver" or "Purple" in your text. Just use the symbols.`;

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.3-70b-versatile", messages: [{role:"system", content:system}, ...history], temperature: 0.75})
            });
            const data = await res.json();
            const reply = data.choices[0].message;
            history.push(reply);
            localStorage.setItem('serana_history', JSON.stringify(history));
            render();
            generateVisual(reply.content);
        } catch(e) { alert("Error: " + e); }
    }

    function resetHistory() { if(confirm('Reset?')) { localStorage.removeItem('serana_history'); location.reload(); } }
    function regenerate() { if(history.length > 1) speak(true); }
</script>
</body>
</html>
